<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EriksChatBot</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            padding: 0;
        }

        #chat-container {
            width: 100%;
            max-width: 480px;
            height: 100dvh;
            background: #161b22;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #30363d;
            border-right: 1px solid #30363d;
        }

        #chat-header {
            padding: 16px 20px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #chat-header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #bc8cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        #chat-header .info .name {
            font-weight: 600;
            font-size: 16px;
        }

        #chat-header .info .status {
            font-size: 12px;
            color: #3fb950;
        }

        #messages {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #30363d transparent;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background-color: #30363d;
            border-radius: 4px;
        }

        .message {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 78%;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: #1f6feb;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background: #21262d;
            color: #e6edf3;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #30363d;
        }

        .bot-msg.loading {
            color: #8b949e;
            font-style: italic;
        }

        #input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 12px 16px;
            background: #161b22;
            border-top: 1px solid #30363d;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            border-radius: 22px;
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.4;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        #userInput::placeholder {
            color: #484f58;
        }

        #userInput:focus {
            border-color: #58a6ff;
        }

        #sendBtn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1f6feb;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.1s;
        }

        #sendBtn:hover {
            background: #388bfd;
        }

        #sendBtn:active {
            transform: scale(0.93);
        }

        #sendBtn:disabled {
            background: #30363d;
            cursor: not-allowed;
            transform: none;
        }

        #sendBtn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (min-width: 481px) {
            body {
                padding: 20px;
            }
            #chat-container {
                height: 90vh;
                max-height: 800px;
                border-radius: 16px;
                border: 1px solid #30363d;
            }
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">
        <div class="avatar">🤖</div>
        <div class="info">
            <div class="name">EriksChatBot</div>
            <div class="status">● Online</div>
        </div>
    </div>

    <div id="messages">
        <div class="message bot-msg">Hej! Hur kan jag hjälpa dig idag?</div>
    </div>

    <div id="input-area">
        <textarea
            id="userInput"
            rows="1"
            placeholder="Skriv ett meddelande..."
        ></textarea>
        <button id="sendBtn" title="Skicka">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    // --- INSTÄLLNINGAR ---
    // VARNING: API-nyckeln nedan är synlig i sidkällan för alla besökare.
    // Byt aldrig ut platshållaren mot din riktiga nyckel i ett publikt repo.
    // Använd istället en backend-server för produktionsbruk.
    const HF_API_KEY = 'byt_ut_mot_din_nyckel_har';
    const MODEL_URL = 'https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta';
    // ---------------------

    const messagesDiv = document.getElementById('messages');
    const userInput   = document.getElementById('userInput');
    const sendBtn     = document.getElementById('sendBtn');

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    let msgCounter = 0;

    function addMessage(text, className) {
        const div = document.createElement('div');
        div.className = 'message ' + className;
        div.id = 'msg-' + (++msgCounter);
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return div.id;
    }

    function updateMessage(id, text, newClass) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        if (newClass) el.className = 'message ' + newClass;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;

        const loadingId = addMessage('Tänker...', 'bot-msg loading');

        try {
            const response = await fetch(MODEL_URL, {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + HF_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ inputs: text })
            });

            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }

            const data = await response.json();

            let botReply = 'Kunde inte generera ett svar.';

            if (Array.isArray(data) && data[0] && data[0].generated_text) {
                botReply = data[0].generated_text;
                // Strip echoed prompt if model returns full text
                if (botReply.startsWith(text)) {
                    botReply = botReply.slice(text.length).trim();
                }
                if (!botReply) botReply = 'Kunde inte generera ett svar.';
            } else if (data && data.error) {
                botReply = 'Fel: ' + data.error;
            }

            updateMessage(loadingId, botReply, 'bot-msg');

        } catch (err) {
            updateMessage(loadingId, 'Kunde inte ansluta. Kontrollera API-nyckeln och internet.', 'bot-msg');
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }
</script>

</body>
</html>
